# Google Cloud Build — GoGoMio (Motion In Ocean)
#
# Purpose: Builds and deploys a demo instance to Google Cloud Run.
#          This is NOT the production image — real users pull from docker.io/DockerHub.
#
# Trigger: Manual or automatic on version tags (configure in GCP Console → Cloud Build → Triggers)
# Platform: linux/amd64 (Cloud Run is amd64-only; no QEMU/Buildx needed)
# Registry: Google Artifact Registry (GAR)
#
# Pre-requisite: GAR repository must exist before running this build (one-time setup):
#   gcloud artifacts repositories create gogomio \
#     --repository-format=docker \
#     --location=us-central1 \
#     --description="GoGoMio demo images"
#
# Required substitutions (override in GCP trigger or --substitutions flag):
#   _GAR_REGION      : Artifact Registry region       (e.g. us-central1, europe-west1)
#   _GAR_REPO        : Artifact Registry repository   (e.g. gogomio)
#   _IMAGE_NAME      : Image name                     (default: gogomio)
#   _IMAGE_TAG       : Primary image tag              (default: latest)
#   _CLOUD_RUN_REGION: Cloud Run deployment region    (e.g. us-central1, europe-west1)
#   _SERVICE_NAME    : Cloud Run service name         (default: gogomio-demo)
#   _SERVICE_PORT    : Cloud Run container port        (default: 8000)
#
# Usage (manual via gcloud):
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions _GAR_REGION=us-central1,_GAR_REPO=gogomio,_IMAGE_TAG=latest,_SERVICE_PORT=8000 \
#     .
#
# Usage (with version tag substitution):
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions _GAR_REGION=us-central1,_GAR_REPO=gogomio,_IMAGE_TAG=v0.2.0,_SERVICE_PORT=8000 \
#     .

substitutions:
  _GAR_REGION: europe-west1
  _GAR_REPO: gogomio
  _IMAGE_NAME: gogomio
  _IMAGE_TAG: latest
  _CLOUD_RUN_REGION: europe-west1
  _SERVICE_NAME: gogomio-demo
  _SERVICE_PORT: "8000"

steps:
  # ---- Step 1: Build image ----
  # Plain docker build with BuildKit enabled — no Buildx or QEMU needed.
  # Cloud Run only runs linux/amd64, so cross-compilation is unnecessary here.
  # For production Pi deployments, use the existing docker.io build workflow.
  - name: gcr.io/cloud-builders/docker
    id: build-and-push
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --progress
      - plain
      - --platform
      - linux/amd64
      - --tag
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --tag
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:$SHORT_SHA
      - --build-arg
      - VERSION=${_IMAGE_TAG}
      - --build-arg
      - PORT=${_SERVICE_PORT}
      - .

  # ---- Step 2: Push image to GAR ----
  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - --all-tags
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}
    waitFor:
      - build-and-push

  # ---- Step 3: Deploy to Cloud Run (demo) ----
  # Uses MOCK_CAMERA=true since Cloud Run has no CSI camera hardware.
  # For production Pi deployments, pull from docker.io and run locally.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --region
      - ${_CLOUD_RUN_REGION}
      - --platform
      - managed
      - --port
      - ${_SERVICE_PORT}
      - --allow-unauthenticated
      - --set-env-vars
      - MOCK_CAMERA=true
    waitFor:
      - push-image

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
