<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion In Ocean - Go Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 20px;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .video-section h2,
        .controls-section h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        #stream-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        #stream-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .stream-status {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }

        .stream-controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background: #4caf50;
        }

        .status-indicator.inactive {
            background: #f44336;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="number"],
        input[type="range"],
        input[type="color"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="range"]:focus,
        input[type="color"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            cursor: pointer;
        }

        .range-value {
            display: inline-block;
            float: right;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 40px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 15px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌊 Motion In Ocean</h1>
            <p class="subtitle">Go Edition - Live Streaming Camera</p>
        </header>

        <div class="main-grid">
            <div class="card video-section">
                <h2>Live Stream</h2>
                <div id="stream-container">
                    <img id="stream-img" alt="Live stream" style="display:none;">
                    <div id="stream-loading">
                        <div style="text-align: center; color: #999;">
                            <p id="stream-placeholder-text" style="margin-bottom: 10px;">▶️ Stream is stopped</p>
                            <div id="stream-spinner" style="display: none; width: 40px; height: 40px; border: 4px solid #667eea; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                        </div>
                    </div>
                </div>
                <div class="stream-controls">
                    <button class="btn-primary" id="start-stream">Start Stream</button>
                    <button class="btn-secondary" id="stop-stream" disabled>Stop Stream</button>
                </div>
                <div class="stream-status">
                    <span class="status-indicator inactive" id="status-indicator"></span>
                    <span id="status-text">Stopped</span>
                </div>
            </div>

            <div class="card controls-section">
                <h2>Settings & Stats</h2>

                <div id="message" class="message"></div>

                <div class="form-group">
                    <label>Brightness</label>
                    <input type="range" id="brightness" min="0" max="200" value="100" step="1">
                    <span class="range-value"><span id="brightness-value">100</span>%</span>
                </div>

                <div class="form-group">
                    <label>Contrast</label>
                    <input type="range" id="contrast" min="0" max="200" value="100" step="1">
                    <span class="range-value"><span id="contrast-value">100</span>%</span>
                </div>

                <div class="form-group">
                    <label>Saturation</label>
                    <input type="range" id="saturation" min="0" max="200" value="100" step="1">
                    <span class="range-value"><span id="saturation-value">100</span>%</span>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="save-settings">Save Settings</button>
                    <button class="btn-secondary" id="reset-settings">Reset</button>
                </div>

                <button class="btn-secondary" id="diagnostics-btn" style="margin-top: 10px; width: 100%;" onclick="openDiagnosticsModal()">📊 Diagnostics</button>

                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">FPS</div>
                        <div class="stat-value" id="stat-fps">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Resolution</div>
                        <div class="stat-value" id="stat-resolution">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Quality</div>
                        <div class="stat-value" id="stat-quality">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Connections</div>
                        <div class="stat-value" id="stat-connections">--</div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Motion In Ocean v0.1.0-dev | Raspberry Pi Camera Streaming</p>
        </footer>
    </div>

    <!-- Diagnostics Modal -->
    <div id="diagnostics-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 12px; padding: 30px; max-width: 500px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; color: #667eea;">System Diagnostics</h2>
                <button onclick="closeDiagnosticsModal()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999;">&times;</button>
            </div>
            
            <div id="diagnostics-content" style="display: grid; gap: 15px;">
                <!-- Diagnostics will be populated here -->
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        class StreamController {
            constructor() {
                this.imageElement = document.getElementById("stream-img");
                this.loadingElement = document.getElementById("stream-loading");
                this.placeholderText = document.getElementById("stream-placeholder-text");
                this.spinnerElement = document.getElementById("stream-spinner");
                this.statusIndicator = document.getElementById("status-indicator");
                this.statusText = document.getElementById("status-text");
                this.messageBox = document.getElementById("message");
                this.startButton = document.getElementById("start-stream");
                this.stopButton = document.getElementById("stop-stream");
                this.isStreaming = false;
                this.statsInterval = null;

                this.initializeStream();
                this.attachEventListeners();
                this.loadStats();
                this.loadSettings();
            }

            initializeStream() {
                this.imageElement.onload = () => {
                    if (!this.imageElement.getAttribute("src")) return;
                    this.isStreaming = true;
                    this.loadingElement.style.display = "none";
                    this.spinnerElement.style.display = "none";
                    this.imageElement.style.display = "block";
                    this.updateStreamControls();
                    this.updateStatus("Streaming", true);
                };

                this.imageElement.onerror = () => {
                    this.isStreaming = false;
                    this.imageElement.removeAttribute("src");
                    this.loadingElement.style.display = "block";
                    this.spinnerElement.style.display = "none";
                    this.imageElement.style.display = "none";
                    this.placeholderText.textContent = "⚠️ Stream disconnected";
                    this.updateStreamControls();
                    this.updateStatus("Disconnected", false);
                    this.stopStatsPolling();
                    document.getElementById("stat-connections").textContent = "0";
                };
                this.updateStreamControls();
            }

            updateStatus(text, isActive) {
                this.statusText.textContent = text;
                this.statusIndicator.className = isActive ? "status-indicator active" : "status-indicator inactive";
            }

            attachEventListeners() {
                document.getElementById("save-settings").addEventListener("click", () => this.saveSettings());
                document.getElementById("reset-settings").addEventListener("click", () => this.resetSettings());
                this.startButton.addEventListener("click", () => this.startStream());
                this.stopButton.addEventListener("click", () => this.stopStream());

                // Update range display values
                ["brightness", "contrast", "saturation"].forEach(id => {
                    const input = document.getElementById(id);
                    input.addEventListener("input", (e) => {
                        document.getElementById(id + "-value").textContent = e.target.value;
                    });
                });
            }

            startStream() {
                if (this.isStreaming) return;

                this.placeholderText.textContent = "📡 Connecting to stream...";
                this.loadingElement.style.display = "block";
                this.spinnerElement.style.display = "inline-block";
                this.imageElement.style.display = "none";
                this.updateStatus("Starting...", false);
                this.imageElement.src = "/stream.mjpg";
                this.startStatsPolling();
            }

            stopStream() {
                this.imageElement.removeAttribute("src");
                this.isStreaming = false;
                this.imageElement.style.display = "none";
                this.loadingElement.style.display = "block";
                this.spinnerElement.style.display = "none";
                this.placeholderText.textContent = "⏹️ Stream stopped";
                this.updateStreamControls();
                this.updateStatus("Stopped", false);
                this.stopStatsPolling();
                document.getElementById("stat-connections").textContent = "0";
            }

            updateStreamControls() {
                this.startButton.disabled = this.isStreaming;
                this.stopButton.disabled = !this.isStreaming;
            }

            startStatsPolling() {
                if (this.statsInterval !== null) return;
                this.statsInterval = setInterval(() => {
                    this.loadStats();
                }, 2000);
            }

            stopStatsPolling() {
                if (this.statsInterval === null) return;
                clearInterval(this.statsInterval);
                this.statsInterval = null;
            }

            async loadSettings() {
                try {
                    const response = await fetch("/api/settings");
                    if (!response.ok) throw new Error("Failed to load settings");

                    const settings = await response.json();
                    if (settings.brightness !== undefined) {
                        document.getElementById("brightness").value = settings.brightness;
                        document.getElementById("brightness-value").textContent = settings.brightness;
                    }
                    if (settings.contrast !== undefined) {
                        document.getElementById("contrast").value = settings.contrast;
                        document.getElementById("contrast-value").textContent = settings.contrast;
                    }
                    if (settings.saturation !== undefined) {
                        document.getElementById("saturation").value = settings.saturation;
                        document.getElementById("saturation-value").textContent = settings.saturation;
                    }
                } catch (error) {
                    console.log("No saved settings found");
                }
            }

            async saveSettings() {
                const settings = {
                    brightness: parseInt(document.getElementById("brightness").value),
                    contrast: parseInt(document.getElementById("contrast").value),
                    saturation: parseInt(document.getElementById("saturation").value)
                };

                try {
                    const response = await fetch("/api/settings", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(settings)
                    });

                    if (!response.ok) throw new Error("Failed to save settings");

                    this.showMessage("Settings saved successfully!", "success");
                } catch (error) {
                    this.showMessage("Failed to save settings: " + error.message, "error");
                }
            }

            resetSettings() {
                document.getElementById("brightness").value = 100;
                document.getElementById("brightness-value").textContent = "100";
                document.getElementById("contrast").value = 100;
                document.getElementById("contrast-value").textContent = "100";
                document.getElementById("saturation").value = 100;
                document.getElementById("saturation-value").textContent = "100";
                this.showMessage("Settings reset to defaults", "success");
            }

            async loadStats() {
                try {
                    const response = await fetch("/api/config");
                    if (!response.ok) throw new Error("Failed to load stats");

                    const config = await response.json();
                    document.getElementById("stat-fps").textContent = config.fps || "--";
                    document.getElementById("stat-resolution").textContent =
                        (config.resolution ? `${config.resolution[0]}x${config.resolution[1]}` : "--");
                    document.getElementById("stat-quality").textContent = (config.jpeg_quality || "--") + "%";
                    document.getElementById("stat-connections").textContent = config.active_stream_connections || "0";
                } catch (error) {
                    console.error("Error loading stats:", error);
                }
            }

            showMessage(text, type) {
                const msg = document.getElementById("message");
                msg.textContent = text;
                msg.className = `message show ${type}`;
                setTimeout(() => {
                    msg.classList.remove("show");
                }, 3000);
            }
        }

        // Diagnostics functions
        function openDiagnosticsModal() {
            document.getElementById('diagnostics-modal').style.display = 'flex';
            fetchDiagnostics();
        }

        function closeDiagnosticsModal() {
            document.getElementById('diagnostics-modal').style.display = 'none';
        }

        function fetchDiagnostics() {
            fetch('/api/diagnostics')
                .then(res => res.json())
                .then(data => {
                    const content = document.getElementById('diagnostics-content');
                    content.innerHTML = `
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div style="background: ${data.camera_ready ? '#d4edda' : '#f8d7da'}; padding: 12px; border-radius: 6px;">
                                <div style="font-size: 0.9em; color: ${data.camera_ready ? '#155724' : '#721c24'}; font-weight: 500;">Camera Status</div>
                                <div style="font-size: 1.3em; font-weight: bold; color: ${data.camera_ready ? '#155724' : '#721c24'}; margin-top: 5px;">
                                    ${data.camera_ready ? '✓ Ready' : '✗ Error'}
                                </div>
                            </div>
                            <div style="background: #d1ecf1; padding: 12px; border-radius: 6px;">
                                <div style="font-size: 0.9em; color: #0c5460; font-weight: 500;">System Status</div>
                                <div style="font-size: 1.3em; font-weight: bold; color: #0c5460; margin-top: 5px;">
                                    ${data.status.toUpperCase()}
                                </div>
                            </div>
                        </div>

                        <div style="border-top: 1px solid #eee; padding-top: 15px;">
                            <div style="font-weight: 600; margin-bottom: 10px; color: #333;">Details</div>
                            <table style="width: 100%; font-size: 0.95em;">
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 8px 0; color: #666;">Uptime</td>
                                    <td style="text-align: right; font-weight: 500;">${formatUptime(data.uptime_seconds)}</td>
                                </tr>
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 8px 0; color: #666;">Frames/Second</td>
                                    <td style="text-align: right; font-weight: 500;">${data.fps.toFixed(1)} fps</td>
                                </tr>
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 8px 0; color: #666;">Frames Captured</td>
                                    <td style="text-align: right; font-weight: 500;">${data.frames_captured}</td>
                                </tr>
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 8px 0; color: #666;">Last Frame Age</td>
                                    <td style="text-align: right; font-weight: 500;">${data.last_frame_age_seconds.toFixed(2)}s ago</td>
                                </tr>
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 8px 0; color: #666;">Resolution</td>
                                    <td style="text-align: right; font-weight: 500;">${data.resolution}</td>
                                </tr>
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 8px 0; color: #666;">JPEG Quality</td>
                                    <td style="text-align: right; font-weight: 500;">${data.jpeg_quality}%</td>
                                </tr>
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 8px 0; color: #666;">Active Streams</td>
                                    <td style="text-align: right; font-weight: 500;">${data.stream_connections}/${data.max_stream_connections}</td>
                                </tr>
                            </table>
                        </div>

                        <div style="background: ${data.camera_ready ? '#d4edda' : '#fff3cd'}; padding: 12px; border-radius: 6px; margin-top: 15px; border-left: 4px solid ${data.camera_ready ? '#28a745' : '#ffc107'};">
                            <div style="font-size: 0.9em; color: ${data.camera_ready ? '#155724' : '#856404'};">
                                <strong>Message:</strong> ${data.message}
                            </div>
                        </div>
                    `;
                })
                .catch(err => {
                    const content = document.getElementById('diagnostics-content');
                    content.innerHTML = '<div style="color: #721c24; background: #f8d7da; padding: 12px; border-radius: 6px;">Failed to fetch diagnostics: ' + err + '</div>';
                });
        }

        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${mins}m`;
            if (mins > 0) return `${mins}m ${secs}s`;
            return `${secs}s`;
        }

        // Close modal when clicking outside
        document.getElementById('diagnostics-modal')?.addEventListener('click', function(e) {
            if (e.target === this) closeDiagnosticsModal();
        });

        // Initialize when DOM is ready
        document.addEventListener("DOMContentLoaded", () => {
            new StreamController();
        });
    </script>
</body>
</html>
