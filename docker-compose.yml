services:
  gogomio:
    image: docker.io/cyanautomation/gogomio:latest
    # For Raspberry Pi, use multi-arch builds
    platform: linux/arm64
    ports:
      - "8000:8000"
    environment:
      # Camera configuration
      MIO_RESOLUTION: "640x480"
      MIO_FPS: 24
      MIO_TARGET_FPS: 24
      MIO_JPEG_QUALITY: 90
      MIO_MAX_STREAM_CONNECTIONS: 10
      MIO_PORT: 8000
      MIO_BIND_HOST: "0.0.0.0"
      MIO_APP_MODE: "webcam"
      MOCK_CAMERA: "false"
    
    # For real Raspberry Pi with CSI camera, uncomment device mappings
    devices:
      - /dev/video0:/dev/video0     # CSI camera device
      # - /dev/mem:/dev/mem          # Required for libcamera (optional)
    
    # Volume for persistent state
    volumes:
      - /tmp/gogomio:/tmp
    
    # Resource limits (adjust for your Pi model)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
