---
# GoGoMio Docker Compose Configuration
#
# CLI Usage Examples:
# - Start server: docker-compose up -d
# - Check status: docker-compose exec gogomio gogomio status
# - Get config: docker-compose exec gogomio gogomio config
# - Get specific value: docker-compose exec gogomio gogomio config get fps
# - Health check: docker-compose exec gogomio gogomio health check
# - Diagnostics: docker-compose exec gogomio gogomio diagnostics
# - Snapshot: docker-compose exec gogomio gogomio snapshot save /tmp/frame.jpg
#
# Environment Variables:
# Copy .env.example to .env and configure:
# - GOGOMIO_PORT: HTTP server port (default: 8000)
# - MOCK_CAMERA: Use mock camera (true/false)
# - MIO_FPS: Frames per second (default: 24)
# - MIO_RESOLUTION: Video resolution (default: 640x480)
# - MIO_JPEG_QUALITY: JPEG compression (default: 90)

services:
  gogomio:
    image: docker.io/cyanautomation/gogomio:${GOGOMIO_IMAGE_TAG:-latest}
    container_name: gogomio
    restart: unless-stopped
    env_file: ./.env

    security_opt:
      - no-new-privileges:true

    platform: linux/arm64

    # Enable privileged mode for full device access (required for CSI camera on Raspberry Pi)
    # This grants access to camera ISP, hardware memory, and media controllers
    privileged: true

    environment:
      TZ: ${TZ}
      MIO_RESOLUTION: ${MIO_RESOLUTION}
      MIO_FPS: ${MIO_FPS}
      MIO_TARGET_FPS: ${MIO_TARGET_FPS}
      MIO_JPEG_QUALITY: ${MIO_JPEG_QUALITY}
      MIO_MAX_STREAM_CONNECTIONS: ${MIO_MAX_STREAM_CONNECTIONS}
      MIO_PORT: ${GOGOMIO_PORT}
      MIO_BIND_HOST: ${MIO_BIND_HOST}
      MOCK_CAMERA: ${MOCK_CAMERA}

    ports:
      - "${GOGOMIO_PORT}:${GOGOMIO_PORT}"

    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Provide udev information for device discovery and permission management
      - /run/udev:/run/udev:ro

    devices:
      # Camera ISP control - Required for camera initialization on Raspberry Pi
      - /dev/vchiq:/dev/vchiq
      # Memory devices - Required for libcamera memory management on modern Pi OS
      - /dev/mem:/dev/mem
      - /dev/dma_heap:/dev/dma_heap
      # Media controller device - Required for libcamera camera enumeration
      - /dev/media0:/dev/media0
      - /dev/media1:/dev/media1
      # V4L2 sub-device - Used for camera sensor control on unicam driver
      - /dev/v4l-subdev0:/dev/v4l-subdev0
      # Video device nodes - Pi 4/5 typically use video0, plus numbered nodes for ISP (10-23)
      - /dev/video0:/dev/video0
      - /dev/video10:/dev/video10
      - /dev/video11:/dev/video11
      - /dev/video12:/dev/video12
      - /dev/video13:/dev/video13
      - /dev/video14:/dev/video14
      - /dev/video15:/dev/video15
      - /dev/video16:/dev/video16
      - /dev/video18:/dev/video18

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${GOGOMIO_PORT}/ready >/dev/null || exit 1"]
      interval: 2m
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
