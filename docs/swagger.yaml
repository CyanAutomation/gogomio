basePath: /
definitions:
  api.CameraConfigResponse:
    description: Camera configuration, resolution, and streaming performance metrics
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      fps:
        description: Configured frames per second
        example: 30
        type: integer
      jpeg_quality:
        description: JPEG compression quality (0-100)
        example: 85
        type: integer
      max_stream_connections:
        description: Maximum concurrent stream connections allowed
        example: 5
        type: integer
      resolution:
        description: Camera resolution in pixels [width, height]
        items:
          type: integer
        type: array
      target_fps:
        description: Target FPS for frame buffer
        example: 30
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
    type: object
  api.DetailedHealthResponse:
    description: Comprehensive health status with detailed metrics, error tracking,
      and diagnostics
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      camera_ready:
        description: Whether the camera is initialized and ready
        example: true
        type: boolean
      capture_failures_consecutive:
        description: Consecutive capture failures (resets on success)
        example: 0
        type: integer
      capture_failures_total:
        description: Total capture failures since startup
        example: 10
        type: integer
      capture_restart_count:
        description: Number of times capture has been restarted
        example: 2
        type: integer
      degraded:
        description: Whether system is operating in degraded mode
        example: false
        type: boolean
      error_rate_percent:
        description: Error rate as percentage
        example: 0.5
        type: number
      fps_configured:
        description: Configured frames per second
        example: 30
        type: integer
      fps_current:
        description: Current frames per second
        example: 29.8
        type: number
      frame_sequence_number:
        description: Frame sequence number (increments per frame)
        example: 216001
        type: integer
      frames_captured:
        description: Total frames captured since startup
        example: 216000
        type: integer
      health_status:
        description: 'Health status text: Excellent, Degraded, Poor'
        example: Excellent
        type: string
      jpeg_quality:
        description: JPEG quality setting (0-100)
        example: 85
        type: integer
      last_frame_age_seconds:
        description: Age of the most recent frame in seconds
        example: 0.034
        type: number
      max_stream_connections:
        description: Maximum concurrent connections
        example: 5
        type: integer
      message:
        description: Detailed status message
        example: Camera is functioning normally
        type: string
      resolution:
        description: Resolution as string (e.g., '1920x1080')
        example: 1920x1080
        type: string
      status:
        description: 'Overall status: ok, degraded, error'
        example: ok
        type: string
      stream_connections:
        description: Current number of active stream connections
        example: 1
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
      uptime_seconds:
        description: System uptime in seconds
        example: 7200
        type: integer
    type: object
  api.ErrorResponse:
    description: Standard error response format for API errors
    properties:
      code:
        description: HTTP status code
        example: 400
        type: integer
      details:
        description: Optional detailed error information
        example: Settings map is empty
        type: string
      message:
        description: Error message
        example: Invalid request
        type: string
    type: object
  api.HealthResponse:
    description: Quick health status (suitable for Kubernetes probes)
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      camera_ready:
        description: Whether the camera is initialized and ready
        example: true
        type: boolean
      degraded:
        description: Whether system is operating in degraded mode
        example: false
        type: boolean
      fps_current:
        description: Current frames per second
        example: 29.8
        type: number
      status:
        description: 'Overall status: ok, degraded, error'
        example: ok
        type: string
      stream_connections:
        description: Current number of active stream connections
        example: 2
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
      uptime_seconds:
        description: System uptime in seconds
        example: 3600
        type: integer
    type: object
  api.LiveMetricsResponse:
    description: Current performance and connection metrics
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      fps_configured:
        description: Configured target frames per second
        example: 30
        type: integer
      fps_current:
        description: Current frames per second being delivered
        example: 29.8
        type: number
      frame_sequence_number:
        description: Frame sequence number (increments per frame, useful for detecting
          gaps)
        example: 216001
        type: integer
      frames_captured:
        description: Total frames captured since startup
        example: 216000
        type: integer
      last_frame_age_seconds:
        description: Age of the most recent frame in seconds
        example: 0.034
        type: number
      stream_connections:
        description: Current number of active stream connections
        example: 2
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
      uptime_seconds:
        description: System uptime in seconds
        example: 7200
        type: integer
    type: object
  api.SettingsUpdateRequest:
    description: Request body for updating multiple settings at once
    properties:
      settings:
        additionalProperties: true
        description: Map of setting keys to values
        type: object
    type: object
host: localhost:8000
info:
  contact:
    name: GoGoMio Support
    url: https://github.com/CyanAutomation/gogomio
  description: |-
    IP camera streaming and management API with MJPEG video streaming, real-time health monitoring, and camera configuration management. Designed for Raspberry Pi CSI cameras and compatible devices.

    ## Rate Limiting
    All API endpoints are subject to per-IP rate limiting: **100 requests per 10 seconds per IP address**. Requests exceeding this limit will receive HTTP 429 (Too Many Requests) responses.

    ## Authentication & Security
    ⚠️ **IMPORTANT**: This API has no built-in authentication. It is designed for private/internal networks only.
    - Do NOT expose this service directly to the internet
    - Deploy behind a firewall, VPN, or reverse proxy with authentication
    - Use HTTPS-terminating reverse proxy (nginx, Caddy, etc.) for HTTPS support
    - See Security section in README.md for deployment guidelines

    ## API Versioning
    - Current version: v0.1.0 (Preview/MVP)
    - Endpoints follow semantic versioning at /v1/ path
    - Legacy endpoints at / are maintained for backward compatibility but marked as deprecated
  license:
    name: MIT
    url: https://github.com/CyanAutomation/gogomio/blob/main/LICENSE
  title: GoGoMio API
  version: 0.1.0
paths:
  /v1/api/config:
    get:
      consumes:
      - application/json
      deprecated: true
      description: '**DEPRECATED in v0.1.0** - This endpoint mixes two concerns (static
        config + live metrics). **Migrate to**: Use /v1/config/camera for static settings,
        and /v1/metrics/live for performance metrics. Legacy endpoint will be removed
        in v0.3.0. See README for migration guide.'
      produces:
      - application/json
      responses:
        "200":
          description: Contains all config + metrics fields (see examples)
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get configuration and metrics (DEPRECATED)
      tags:
      - Configuration
  /v1/api/diagnostics:
    get:
      consumes:
      - application/json
      deprecated: true
      description: '**DEPRECATED in v0.1.0** - **Migrate to**: Use /v1/health/detailed
        instead (identical response). Provides complete system diagnostics including
        health status, metrics, error tracking, and failure statistics. Legacy endpoint
        will be removed in v0.3.0. See README for migration guide.'
      produces:
      - application/json
      responses:
        "200":
          description: Complete health and diagnostics snapshot
          schema:
            $ref: '#/definitions/api.DetailedHealthResponse'
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get comprehensive diagnostics (DEPRECATED)
      tags:
      - Diagnostics
  /v1/api/settings:
    get:
      consumes:
      - application/json
      description: Retrieves all saved application settings as a JSON object. Settings
        can include brightness, contrast, saturation, and other camera-specific parameters.
        Returns empty object if no settings saved yet. Use PUT or POST with /v1/api/settings
        to update.
      produces:
      - application/json
      responses:
        "200":
          description: 'Object containing all saved settings (example: {brightness:
            100, contrast: 120})'
          schema:
            additionalProperties: true
            type: object
      summary: Get all settings
      tags:
      - Settings
    post:
      consumes:
      - application/json
      description: Updates one or more application settings (brightness, contrast,
        saturation, etc). Accepts POST and PUT requests. Only specified settings are
        updated; omitted settings are preserved. Returns updated settings. Settings
        persist across restarts.
      parameters:
      - description: 'Settings to update (example: {\'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SettingsUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated settings
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid JSON or request format
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Failed to save settings to persistent storage
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Update camera settings
      tags:
      - Settings
    put:
      consumes:
      - application/json
      description: Updates one or more application settings (brightness, contrast,
        saturation, etc). Accepts POST and PUT requests. Only specified settings are
        updated; omitted settings are preserved. Returns updated settings. Settings
        persist across restarts.
      parameters:
      - description: 'Settings to update (example: {\'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SettingsUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated settings
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid JSON or request format
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Failed to save settings to persistent storage
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Update camera settings
      tags:
      - Settings
  /v1/api/status:
    get:
      consumes:
      - application/json
      deprecated: true
      description: '**DEPRECATED in v0.1.0** - **Migrate to**: Use /v1/health/detailed
        instead (identical response). Legacy endpoint will be removed in v0.3.0. See
        README for migration guide.'
      produces:
      - application/json
      responses:
        "200":
          description: Complete health snapshot
          schema:
            $ref: '#/definitions/api.DetailedHealthResponse'
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get system status (DEPRECATED)
      tags:
      - Health
  /v1/api/stream/stop:
    post:
      consumes:
      - application/json
      description: Stops the camera stream capture and disconnects all clients
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Stop stream capture
      tags:
      - Streaming
  /v1/config/camera:
    get:
      consumes:
      - application/json
      description: Returns static camera configuration (resolution, FPS, quality settings,
        connection limits). Use this for UI configuration displays or to understand
        camera capabilities. Does not include runtime metrics; use /v1/metrics/live
        for current performance data.
      produces:
      - application/json
      responses:
        "200":
          description: Static configuration settings
          schema:
            $ref: '#/definitions/api.CameraConfigResponse'
      summary: Get camera configuration
      tags:
      - Configuration
  /v1/health:
    get:
      consumes:
      - application/json
      description: Returns quick camera health status suitable for Kubernetes liveness
        probes. Returns 200 OK if running (regardless of camera state), and includes
        status, fps, uptime, and connection count. For detailed health with metrics,
        use /v1/health/detailed instead.
      produces:
      - application/json
      responses:
        "200":
          description: Camera status ok/degraded/error
          schema:
            $ref: '#/definitions/api.HealthResponse'
        "503":
          description: Service unavailable (should not occur in normal operation)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Quick health check (Kubernetes probe)
      tags:
      - Health
  /v1/health/detailed:
    get:
      consumes:
      - application/json
      description: 'Returns all available health information, metrics, and diagnostics
        in a single request: status, uptime, FPS, frames captured, connections, error
        rates, restart count, frame sequence, and detailed failure tracking. Recommended
        for dashboards, monitoring systems, and troubleshooting. Note: more data than
        /v1/health or /v1/metrics/live, use appropriate endpoint for your use case.'
      produces:
      - application/json
      responses:
        "200":
          description: Complete health and metrics snapshot
          schema:
            $ref: '#/definitions/api.DetailedHealthResponse'
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get comprehensive health and diagnostics
      tags:
      - Health
  /v1/metrics/live:
    get:
      consumes:
      - application/json
      description: 'Returns current runtime performance metrics: frame rate, captured
        frames, stream connections, and frame sequence number. Lightweight and suitable
        for frequent polling (combine with rate limiting awareness). Use /v1/config/camera
        for static configuration values.'
      produces:
      - application/json
      responses:
        "200":
          description: Current performance metrics
          schema:
            $ref: '#/definitions/api.LiveMetricsResponse'
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get live performance metrics
      tags:
      - Metrics
  /v1/ready:
    get:
      consumes:
      - application/json
      description: Returns 200 only when camera is fully initialized and ready to
        stream. Returns 503 during startup. Suitable for Kubernetes readiness probes
        to control traffic routing. Use /v1/health for liveness checks instead.
      produces:
      - application/json
      responses:
        "200":
          description: 'Status: ready'
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Camera still initializing
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe (Kubernetes)
      tags:
      - Health
  /v1/snapshot.jpg:
    get:
      consumes:
      - application/json
      description: Returns the latest captured video frame as a JPEG image. Suitable
        for web UI embedding, thumbnails, or periodic frame capture. Respects JPEG
        quality setting from /v1/config/camera. Returns 503 if camera not yet initialized.
      produces:
      - image/jpeg
      responses:
        "200":
          description: 'JPEG image data (raw binary, Content-Type: image/jpeg)'
          schema:
            type: file
        "429":
          description: Rate limit exceeded (100 req/10sec per IP)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Camera not ready or not initialized yet
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get current snapshot as JPEG
      tags:
      - Streaming
schemes:
- http
- https
swagger: "2.0"
