basePath: /
definitions:
  api.CameraConfigResponse:
    description: Camera configuration, resolution, and streaming performance metrics
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      fps:
        description: Configured frames per second
        example: 30
        type: integer
      jpeg_quality:
        description: JPEG compression quality (0-100)
        example: 85
        type: integer
      max_stream_connections:
        description: Maximum concurrent stream connections allowed
        example: 5
        type: integer
      resolution:
        description: Camera resolution in pixels [width, height]
        items:
          type: integer
        type: array
      target_fps:
        description: Target FPS for frame buffer
        example: 30
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
    type: object
  api.DetailedHealthResponse:
    description: Comprehensive health status with detailed metrics, error tracking,
      and diagnostics
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      camera_ready:
        description: Whether the camera is initialized and ready
        example: true
        type: boolean
      capture_failures_consecutive:
        description: Consecutive capture failures (resets on success)
        example: 0
        type: integer
      capture_failures_total:
        description: Total capture failures since startup
        example: 10
        type: integer
      capture_restart_count:
        description: Number of times capture has been restarted
        example: 2
        type: integer
      degraded:
        description: Whether system is operating in degraded mode
        example: false
        type: boolean
      error_rate_percent:
        description: Error rate as percentage
        example: 0.5
        type: number
      fps_configured:
        description: Configured frames per second
        example: 30
        type: integer
      fps_current:
        description: Current frames per second
        example: 29.8
        type: number
      frame_sequence_number:
        description: Frame sequence number (increments per frame)
        example: 216001
        type: integer
      frames_captured:
        description: Total frames captured since startup
        example: 216000
        type: integer
      health_status:
        description: 'Health status text: Excellent, Degraded, Poor'
        example: Excellent
        type: string
      jpeg_quality:
        description: JPEG quality setting (0-100)
        example: 85
        type: integer
      last_frame_age_seconds:
        description: Age of the most recent frame in seconds
        example: 0.034
        type: number
      max_stream_connections:
        description: Maximum concurrent connections
        example: 5
        type: integer
      message:
        description: Detailed status message
        example: Camera is functioning normally
        type: string
      resolution:
        description: Resolution as string (e.g., '1920x1080')
        example: 1920x1080
        type: string
      status:
        description: 'Overall status: ok, degraded, error'
        example: ok
        type: string
      stream_connections:
        description: Current number of active stream connections
        example: 1
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
      uptime_seconds:
        description: System uptime in seconds
        example: 7200
        type: integer
    type: object
  api.HealthResponse:
    description: Quick health status (suitable for Kubernetes probes)
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      camera_ready:
        description: Whether the camera is initialized and ready
        example: true
        type: boolean
      degraded:
        description: Whether system is operating in degraded mode
        example: false
        type: boolean
      fps_current:
        description: Current frames per second
        example: 29.8
        type: number
      status:
        description: 'Overall status: ok, degraded, error'
        example: ok
        type: string
      stream_connections:
        description: Current number of active stream connections
        example: 2
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
      uptime_seconds:
        description: System uptime in seconds
        example: 3600
        type: integer
    type: object
  api.LiveMetricsResponse:
    description: Current performance and connection metrics
    properties:
      api_version:
        description: API version
        example: "1"
        type: string
      fps_configured:
        description: Configured target frames per second
        example: 30
        type: integer
      fps_current:
        description: Current frames per second being delivered
        example: 29.8
        type: number
      frame_sequence_number:
        description: Frame sequence number (increments per frame, useful for detecting
          gaps)
        example: 216001
        type: integer
      frames_captured:
        description: Total frames captured since startup
        example: 216000
        type: integer
      last_frame_age_seconds:
        description: Age of the most recent frame in seconds
        example: 0.034
        type: number
      stream_connections:
        description: Current number of active stream connections
        example: 2
        type: integer
      timestamp_iso8601:
        description: ISO8601 timestamp of this response
        example: "2026-04-19T15:30:45Z"
        type: string
      uptime_seconds:
        description: System uptime in seconds
        example: 7200
        type: integer
    type: object
  api.SettingsUpdateRequest:
    description: Request body for updating multiple settings at once
    properties:
      settings:
        additionalProperties: true
        description: Map of setting keys to values
        type: object
    type: object
host: localhost:8080
info:
  contact:
    name: GoGoMio Support
  description: IP camera streaming and management API with MJPEG and health monitoring
  license:
    name: MIT
  title: GoGoMio API
  version: 0.1.0
paths:
  /v1/api/config:
    get:
      consumes:
      - application/json
      deprecated: true
      description: Returns camera configuration and current metrics. This endpoint
        combines two concerns; use /v1/config/camera for static config or /v1/metrics/live
        for metrics instead
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get configuration and metrics (DEPRECATED - use /v1/config/camera and
        /v1/metrics/live)
      tags:
      - Configuration
  /v1/api/diagnostics:
    get:
      consumes:
      - application/json
      deprecated: true
      description: Returns complete system diagnostics. This endpoint is deprecated;
        use /v1/health/detailed instead
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.DetailedHealthResponse'
      summary: Get comprehensive diagnostics (DEPRECATED - use /v1/health/detailed)
      tags:
      - Diagnostics
  /v1/api/settings:
    get:
      consumes:
      - application/json
      description: Retrieves all saved application settings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get all settings
      tags:
      - Settings
    post:
      consumes:
      - application/json
      description: Updates one or more application settings. Accepts both POST and
        PUT requests
      parameters:
      - description: Settings to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SettingsUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update settings
      tags:
      - Settings
    put:
      consumes:
      - application/json
      description: Updates one or more application settings. Accepts both POST and
        PUT requests
      parameters:
      - description: Settings to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SettingsUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update settings
      tags:
      - Settings
  /v1/api/status:
    get:
      consumes:
      - application/json
      deprecated: true
      description: Returns detailed status. This endpoint is deprecated; use /v1/health/detailed
        instead
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: Get system status (DEPRECATED - use /v1/health/detailed)
      tags:
      - Health
  /v1/api/stream/stop:
    post:
      consumes:
      - application/json
      description: Stops the camera stream capture and disconnects all clients
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Stop stream capture
      tags:
      - Streaming
  /v1/config/camera:
    get:
      consumes:
      - application/json
      description: Returns static camera configuration settings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CameraConfigResponse'
      summary: Get camera configuration (static)
      tags:
      - Configuration
  /v1/health:
    get:
      consumes:
      - application/json
      - application/json
      description: |-
        Returns the current health status of the camera system including uptime, FPS, and connection count
        Returns the current health status of the camera system including uptime, FPS, and connection count
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check endpoint
      tags:
      - Health
      - Health
  /v1/health/detailed:
    get:
      consumes:
      - application/json
      description: Returns comprehensive health status with detailed metrics, error
        tracking, and diagnostics
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.DetailedHealthResponse'
      summary: Get detailed health and metrics
      tags:
      - Health
  /v1/metrics/live:
    get:
      consumes:
      - application/json
      description: Returns current performance and connection metrics
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.LiveMetricsResponse'
      summary: Get live metrics
      tags:
      - Metrics
  /v1/ready:
    get:
      consumes:
      - application/json
      description: Returns 200 if camera is ready, 503 if still initializing
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - Health
  /v1/snapshot.jpg:
    get:
      consumes:
      - application/json
      description: Returns the latest captured frame as a JPEG image
      produces:
      - image/jpeg
      responses:
        "200":
          description: JPEG image data
          schema:
            type: file
        "503":
          description: Camera not ready
          schema:
            type: string
      summary: Get current snapshot
      tags:
      - Streaming
swagger: "2.0"
