name: Build Multi-Architecture Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Docker image tags (comma-separated, e.g., latest,0.2.0)'
        required: false
        default: 'latest'

env:
  # Opt into Node.js 24 to proactively support the latest runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine tags
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${{ github.event.inputs.tags }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            TAGS="$VERSION,latest"
          else
            TAGS="latest"
          fi
          
          # Convert comma-separated tags to docker/metadata format (newline-separated for docker/build-push-action)
          # Include both standard tags and arm64-specific tags for easy Raspberry Pi identification
          DOCKER_TAGS=""
          for tag in ${TAGS//,/ }; do
            DOCKER_TAGS="${DOCKER_TAGS}cyanautomation/gogomio:$tag"$'\n'
            # Add arm64-specific tag for Raspberry Pi convenience
            DOCKER_TAGS="${DOCKER_TAGS}cyanautomation/gogomio:$tag-arm64"$'\n'
          done
          
          # Remove trailing newline and save to output
          DOCKER_TAGS="${DOCKER_TAGS%$'\n'}"
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$DOCKER_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "📦 Building tags (multi-arch + arm64-specific):"
          echo "$DOCKER_TAGS"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify multi-arch manifest
        run: |
          # For tag detection: use latest if no specific tag
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" == "refs/tags/v"* ]]; then
            TAG=${TAG#v}
          else
            TAG="latest"
          fi
          
          echo "🔍 Verifying manifest for: cyanautomation/gogomio:$TAG"
          docker manifest inspect cyanautomation/gogomio:$TAG | jq '.manifests[] | "\(.platform.os)/\(.platform.architecture)"'
          echo "✅ Multi-arch image verified successfully"
