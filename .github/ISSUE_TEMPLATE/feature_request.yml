name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe the problem you're trying to solve.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the use case?
      placeholder: "When streaming to multiple clients, there is no way to limit bandwidth per client..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like the feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Camera / Streaming
        - HTTP API
        - CLI
        - Configuration
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: true
